# ─────────────────────────────────────────────────────────────────────────────
# Amiri POS Frontend — Netlify Configuration
# ─────────────────────────────────────────────────────────────────────────────

[build]
  # Vite outputs the production build to the `dist` folder
  publish = "dist"
  command = "npm run build"

# SPA redirect: send all routes to index.html so React Router handles them
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
